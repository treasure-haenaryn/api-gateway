spring:
  application:
    name: api-gateway

  # Virtual Thread 활성화
  threads:
    virtual:
      enabled: true

  # DataSource
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gateway}
    username: ${DB_USERNAME:gateway}
    password: ${DB_PASSWORD:gateway}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0  # DB 연결 실패 시 앱 기동 실패 방지 (0 = 대기)
      connection-timeout: 30000
      validation-timeout: 5000

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Spring Cloud Gateway MVC
  cloud:
    gateway:
      server:
        webmvc:
          enabled: true

# Actuator + Prometheus + OpenTelemetry
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
          - metrics
          - gateway
          - flyway
  endpoint:
    health:
      show-details: always
    flyway:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  opentelemetry:
    resource-attributes:
      service.name: api-gateway
  tracing:
    sampling:
      probability: 1.0  # 개발 환경 100%, 운영 환경 0.1 권장
  otlp:
    metrics:
      export:
        url: ${OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
        enabled: ${OTLP_ENABLED:false}  # 로컬 개발 시 false, 운영 시 true
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# Logging
logging:
  level:
    com.haenaryn.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.flywaydb: DEBUG
