
spring:
  application:
    name: api-gateway

  # Virtual Thread 활성화
  threads:
    virtual:
      enabled: true

  # DataSource
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gateway}
    username: ${DB_USERNAME:gateway}
    password: ${DB_PASSWORD:gateway}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0  # DB 연결 실패 시 앱 기동 실패 방지 (0 = 대기)
      connection-timeout: 30000
      validation-timeout: 5000

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Spring Cloud Gateway MVC
  cloud:
    gateway:
      server:
        webmvc:
          enabled: true

# Actuator + Prometheus + OpenTelemetry
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
          - metrics
          - gateway
          - flyway
          - circuitbreakers
  endpoint:
    health:
      show-details: always
    flyway:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  opentelemetry:
    resource-attributes:
      service.name: api-gateway
  tracing:
    sampling:
      probability: 1.0  # 개발 환경 100%, 운영 환경 0.1 권장
  otlp:
    metrics:
      export:
        url: ${OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
        enabled: ${OTLP_ENABLED:false}  # 로컬 개발 시 false, 운영 시 true
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# Gateway 커스텀 설정
gateway:
  cache:
    # Pub/Sub 유실 대비 안전망 — 30초마다 DB에서 전체 리로드
    route-reload-interval-ms: 30000
    # 캐시 최대 사이즈 — 실제 항목 수만큼만 메모리 사용 (상한선)
    route-max-size: ${CACHE_ROUTE_MAX_SIZE:1000}
    apikey-max-size: ${CACHE_APIKEY_MAX_SIZE:10000}
    scope-max-size: ${CACHE_SCOPE_MAX_SIZE:10000}

  rate-limit:
    # API Key별 요청 제한
    apikey-per-sec: ${RATE_LIMIT_APIKEY_SEC:100}
    apikey-per-day: ${RATE_LIMIT_APIKEY_DAY:10000}
    # IP별 제한 (DDoS 방어)
    ip-per-sec: ${RATE_LIMIT_IP_SEC:30}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    max-age: 3600

  jwt:
    # JWKS 엔드포인트 URL (인증 서버의 공개키 제공 URL)
    jwks-uri: ${JWT_JWKS_URI:http://localhost:9000/.well-known/jwks.json}
    # 공개키 캐시 갱신 주기 (초) — 공개키 교체 대응
    jwks-refresh-interval-sec: ${JWT_JWKS_REFRESH_SEC:3600}
    # JWT 블랙리스트 활성화 여부
    blacklist-enabled: ${JWT_BLACKLIST_ENABLED:true}

# Logging
logging:
  level:
    com.haenaryn.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.flywaydb: DEBUG
